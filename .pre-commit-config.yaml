repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pytest
        name: pytest (unit only — integration tests are opt-in)
        entry: .venv/bin/pytest -q
        language: system
        pass_filenames: false
        types: [python]
