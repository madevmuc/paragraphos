name: build-release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt py2app

      - name: Build standalone .app
        run: .venv/bin/python setup-full.py py2app

      - name: Build DMG
        run: ./scripts/build-dmg.sh "${GITHUB_REF_NAME#v}"

      - name: Upload release artefact
        uses: actions/upload-artifact@v4
        with:
          name: Paragraphos-dmg-${{ github.ref_name }}
          path: dist/*.dmg

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
          draft: true
          generate_release_notes: true
