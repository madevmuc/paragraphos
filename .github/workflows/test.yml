name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Opt every JS action in this workflow into the Node 24 runtime.
# Silences the "Node 20 deprecated" warning on any transitive action
# that hasn't bumped its runs.using yet.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: macos-14
    # Backstop against an occasional hang: fail the job in 20 min instead of
    # letting it sit until the 6 h default. The per-test --timeout below
    # surfaces *which* test hung.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            dev-requirements.txt

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt -r dev-requirements.txt

      - name: Lint with ruff
        run: |
          .venv/bin/pip install ruff
          .venv/bin/ruff check .
          .venv/bin/ruff format --check .

      - name: Run unit tests
        env:
          PYTHONPATH: .
          QT_QPA_PLATFORM: offscreen
        # --timeout fails (with a thread stack dump naming the test) if any
        # single test stalls past 180 s, so an occasional hang is diagnosable
        # instead of an opaque job timeout.
        run: .venv/bin/pytest -q --timeout=180 --timeout-method=thread
